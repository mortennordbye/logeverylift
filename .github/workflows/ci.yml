name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default; the build job opts into packages:write.
permissions:
  contents: read

# A newer push to the same branch/PR cancels the in-flight run — also stops
# two rapid pushes from racing to stamp `latest` on ghcr out of order.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    # Image only builds when tests pass — a red verify must never ship a `latest`
    # tag. Kargo (not this workflow) promotes the pushed image via a homelab PR.
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Buildx with a docker-container driver is required for the GHA cache
      # backend below — the default docker driver can't export cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            # Monotonic SemVer tag the Kargo Warehouse selects (like portfolio/blog).
            type=raw,value=0.0.${{ github.run_number }},enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner
          # PRs build the image to catch Dockerfile breakage but never push.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache in the GitHub Actions cache backend: pnpm install only
          # re-runs when package.json/pnpm-lock.yaml change. mode=max also
          # caches intermediate stages (deps/builder), not just the final image.
          cache-from: type=gha
          cache-to: type=gha,mode=max
